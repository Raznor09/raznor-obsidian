# =================================================================================
# Theme       : raznor-obsidian.yaml
# Author      : Raznor09
# Repository  : https://github.com/Raznor09/raznor-obsidian
# Description : Clean Obsidian theme with full Dark & Light mode support
# Version     : 1.1.0
#
# This file defines multiple theme variants using a single base.
# Please note: 'raznor_base_settings' is NOT a selectable theme.
# It exclusively contains the common base settings that are inherited
# and used by the other theme variants.
# =================================================================================
raznor_base_settings: &raznor_base_settings_anchor
  modes:
    dark:
      # ============================
      # MATERIAL DESIGN 3 FIX (De Graphite-methode)
      # ============================
      md-sys-color-surface: rgb(26, 26, 26)
      md-sys-color-on-surface: rgb(242, 242, 242)
      md-sys-color-surface-container: rgb(26, 26, 26)
      md-sys-color-surface-container-highest: rgb(26, 26, 26)
      md-menu-container-color: rgb(26, 26, 26)
      
      # Dit verwijdert die witte ronde vlek (selectie)
      md-sys-color-secondary-container: rgb(50, 50, 50)
      md-sys-color-on-secondary-container: var(--primary-color)
      
      # Forceer alles solide (geen transparantie/tinten)
      md-sys-color-surface-tint: transparent
      md-sys-elevation-level1: "none"
      md-sys-elevation-level2: "none"
      md-sys-color-shadow: transparent
      
      # De lagen die op laptops vaak wit oplichten op 0 zetten
      md-ripple-focus-opacity: 0.0
      md-ripple-hover-opacity: 0.0
      md-list-item-hover-state-layer-opacity: 0.0
      
      # ============================
      # BASE COLORS & BACKGROUNDS
      # ============================
      primary-background-color: rgb(10, 10, 10)
      secondary-background-color: rgb(26, 26, 26)
      divider-color: var(--primary-background-color)
      card-background-color: rgb(26, 26, 26)
      ha-card-background: var(--card-background-color)
      
      # Text
      primary-text-color: rgb(242, 242, 242)
      secondary-text-color: rgb(166, 166, 166)
      disabled-text-color: rgba(184, 190, 199, 0.4)

      # UI Elements
      sidebar-background-color: var(--primary-background-color)
      sidebar-text-color: rgb(198, 203, 210)
      sidebar-icon-color: rgb(169, 177, 188)
      paper-item-icon-color: rgb(169, 177, 188)

      # Dropdowns Legacy
      mdc-theme-surface: rgb(26, 26, 26)
      paper-listbox-background-color: rgb(26, 26, 26) !important
      paper-listbox-color: rgb(242, 242, 242) !important
      
      # Inputs
      input-fill-color: rgb(26, 26, 26)
      input-ink-color: var(--primary-text-color)
      mdc-select-fill-color: rgb(26, 26, 26)
      mdc-select-ink-color: rgb(242, 242, 242)

# --- THEME VARIANTS ---

Raznor Obsidian - Blue:
  <<: *raznor_base_settings_anchor
  primary-color: rgb(83, 179, 255)
  accent-color: var(--primary-color)
  state-icon-active-color: var(--primary-color)

Raznor Obsidian - Purple:
  <<: *raznor_base_settings_anchor
  primary-color: rgb(126, 26, 178)
